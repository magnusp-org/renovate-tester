name: Test token exchange
on:
  workflow_dispatch:
    inputs:
      target_repository:
        description: "owner/repo to request a token for"
        required: true
        
permissions:
  id-token: write   # required to mint OIDC tokens
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC token
        id: oidc
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: return await core.getIDToken('renovate-scheduler')
          #                                     ^^^ must match OIDC_AUDIENCE

      - name: Request installation token
        id: exchange
        env:
          TOKENHOST: ${{ vars.TOKENHOST }}
        run: |
          RESPONSE=$(curl -sf -X POST https://$TOKENHOST/token \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.result }}" \
            -H "Content-Type: application/json" \
            -d '{"repository": "${{ inputs.target_repository }}"}')
          echo "token=$(echo "$RESPONSE" | jq -r .token)" >> "$GITHUB_OUTPUT"
          echo "expires_at=$(echo "$RESPONSE" | jq -r .expiresAt)" >> "$GITHUB_OUTPUT"

      - name: Verify token works against GitHub API
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ steps.exchange.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ inputs.target_repository }} \
            | jq '{name, full_name, visibility}'
